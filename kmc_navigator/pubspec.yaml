name: kmc_navigator
description: >
  KMC Navigator - Step-by-step indoor walking directions for
  Kottayam Medical College (Medical OP Building, V1).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Firebase ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # --- State management ---
  flutter_riverpod: ^2.5.1

  # --- Navigation ---
  go_router: ^14.2.7

  # --- UI / typography ---
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Uncomment and populate once real assets are added in a later prompt.
  # assets:
  #   - assets/icons/
  #   - assets/images/
